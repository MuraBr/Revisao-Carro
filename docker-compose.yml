services:

  # ─── Banco de dados PostgreSQL ───────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: revisao_postgres
    environment:
      POSTGRES_DB:       ${DB_DATABASE}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # acesso externo opcional (ex: DBeaver)
    networks:
      - revisao
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend Laravel (PHP-FPM) ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: revisao_backend
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    depends_on:
      postgres:
        condition: service_healthy  # espera o Postgres estar pronto
    networks:
      - revisao

  # ─── Nginx (serve o Laravel) ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: revisao_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - revisao

  # ─── Frontend Vue.js ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: revisao_frontend
    ports:
      - "5173:80"
    depends_on:
      - nginx
    networks:
      - revisao

volumes:
  postgres_data:  # volume persistente — dados sobrevivem ao container

networks:
  revisao:
    driver: bridge